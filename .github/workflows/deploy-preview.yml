name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  deployments: write
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Site
        run: npm run build

      - name: Publish to Cloudflare Pages
        id: cloudflare_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy dist
            --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
            --branch=pr-${{ github.event.pull_request.number }}

      - name: Comment PR with Preview Link
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            ### Preview Deployed!
            
            | Item | Status |
            | :--- | :--- |
            | **Latest Deploy** | [Visit Preview](${{ steps.cloudflare_deploy.outputs.pages-deployment-alias-url }}) |
            | **Environment** | `Preview (PR-${{ github.event.pull_request.number }})` |
            | **Action** | [View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
            
            _Last updated at ${{ github.event.pull_request.updated_at }}_
          comment-tag: preview_deploy_status # This ensures it updates the same comment instead of spamming
